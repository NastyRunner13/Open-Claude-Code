# Open Claude Code — Example Configuration
# Copy to occ.yml or .occ/config.yml

# Model (default: claude-sonnet-4-20250514)
model: "claude-sonnet-4-20250514"
max_tokens: 16000

# Mode: ask | plan | agent
mode: "agent"

# Skip all approval prompts (dangerous!)
skip_approval: false

# Tools that auto-approve without prompting
auto_approve:
  - read_file
  - list_directory
  - find_files
  - grep_search
  - web_search
  - read_url
  - load_skill

# Skill directories (searched in order)
skills_dirs:
  - "~/.occ/skills"
  - ".occ/skills"

# Plugin directories
plugins_dirs:
  - "~/.occ/plugins"
  - ".occ/plugins"

# MCP (Model Context Protocol) servers
# mcp_servers:
#   - name: filesystem
#     command: "npx"
#     args: ["-y", "@modelcontextprotocol/server-filesystem", "/path/to/dir"]
#   - name: github
#     command: "npx"
#     args: ["-y", "@modelcontextprotocol/server-github"]
#     env:
#       GITHUB_TOKEN: "ghp_..."

# Context management
max_context_tokens: 100000
context_compaction: true
